<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Icon gradient: blue to cyan (matches sidebar logo) -->
    <linearGradient id="icon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Icon background tile (gradient rounded square) -->
  <rect x="8" y="8" width="48" height="48" rx="11" fill="url(#icon-grad)" filter="url(#glow)" opacity="0.15"/>
  <rect x="8" y="8" width="48" height="48" rx="11" fill="url(#icon-grad)"/>

  <!-- Server body: 3 rack units -->
  <!-- Unit 1 -->
  <rect x="14" y="13" width="36" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <circle cx="19" cy="17.5" r="1.8" fill="#4ade80"/>
  <rect x="23" y="15" width="4" height="5" rx="1" fill="#1e293b"/>
  <rect x="29" y="15" width="4" height="5" rx="1" fill="#1e293b"/>
  <line x1="35" y1="15.5" x2="47" y2="15.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="17.5" x2="47" y2="17.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="19.5" x2="47" y2="19.5" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Unit 2 -->
  <rect x="14" y="24" width="36" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <circle cx="19" cy="28.5" r="1.8" fill="#f59e0b"/>
  <rect x="23" y="26" width="4" height="5" rx="1" fill="#1e293b"/>
  <rect x="29" y="26" width="4" height="5" rx="1" fill="#1e293b"/>
  <line x1="35" y1="26.5" x2="47" y2="26.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="28.5" x2="47" y2="28.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="30.5" x2="47" y2="30.5" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Unit 3 -->
  <rect x="14" y="35" width="36" height="9" rx="2" fill="#0f172a" opacity="0.7"/>
  <circle cx="19" cy="39.5" r="1.8" fill="#4ade80"/>
  <rect x="23" y="37" width="4" height="5" rx="1" fill="#1e293b"/>
  <rect x="29" y="37" width="4" height="5" rx="1" fill="#1e293b"/>
  <line x1="35" y1="37.5" x2="47" y2="37.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="39.5" x2="47" y2="39.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="35" y1="41.5" x2="47" y2="41.5" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Gear overlay (settings/cog) on bottom-right badge -->
  <circle cx="47" cy="48" r="9" fill="#0f172a"/>
  <circle cx="47" cy="48" r="8" fill="url(#icon-grad)"/>
  <!-- Simplified gear: center dot + tick marks -->
  <circle cx="47" cy="48" r="2.5" fill="white"/>
  <line x1="47" y1="42" x2="47" y2="44" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="47" y1="52" x2="47" y2="54" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="41" y1="48" x2="43" y2="48" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="51" y1="48" x2="53" y2="48" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="42.8" y1="43.8" x2="44.2" y2="45.2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="49.8" y1="50.8" x2="51.2" y2="52.2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51.2" y1="43.8" x2="49.8" y2="45.2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44.2" y1="50.8" x2="42.8" y2="52.2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
